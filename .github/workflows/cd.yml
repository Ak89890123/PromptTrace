name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package extension
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run unit and integration tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Package Chrome extension zip
        run: npm run zip

      - name: Collect packaged extension artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_NAME="${GITHUB_REF_NAME}"
          else
            RELEASE_NAME="v$(node -p "require('./package.json').version")"
          fi
          cp .output/*.zip "artifacts/promptrace-${RELEASE_NAME}-chrome.zip"

      - name: Upload packaged extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: promptrace-chrome-extension
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Create GitHub release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          prerelease: true
